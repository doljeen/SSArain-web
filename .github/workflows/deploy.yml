name: Frontend Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ssarain-web:latest

      - name: Deploy frontend to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd "$HOME/ssarain/was/docker"

            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ssarain-web:latest
            sudo docker tag ${{ secrets.DOCKERHUB_USERNAME }}/ssarain-web:latest ssarain-web:latest

            sudo docker compose --env-file /dev/null -f docker-compose.production.yml up -d --force-recreate --no-deps web
            sudo docker image prune -f
